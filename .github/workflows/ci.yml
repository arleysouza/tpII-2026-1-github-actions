name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v6

      - name: Configura Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Instala dependencias
        run: npm ci

      - name: Gera build
        run: npm run build

      - name: Executa testes
        run: npm test -- --runInBand
