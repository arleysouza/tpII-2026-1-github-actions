name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}  # Garante apenas 1 execução por branch/workflow
  cancel-in-progress: true                         # Cancela runs antigos se um novo push for feito

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v6

      - name: Configura Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Instala dependencias
        run: npm ci

      - name: Executa lint
        run: npm run lint

      - name: Gera build
        run: npm run build

      - name: Executa testes com cobertura
        run: npm run test:cov -- --runInBand

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage
